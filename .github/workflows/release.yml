name: APK bauen und veröffentlichen

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Versionstag prüfen und App-Version setzen
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Der Tag muss dem Format 1.2.3 entsprechen."
            exit 1
          fi
          sed -i -E "s/^__version__ = .*/__version__ = \"$GITHUB_REF_NAME\"/" main.py

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Java einrichten
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Linux-Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake cmake gettext libffi-dev libltdl-dev \
            libncurses5-dev libncursesw5-dev libssl-dev libtool \
            libtinfo5 pkg-config unzip zip zlib1g-dev

      - name: Buildozer installieren
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer==1.6.0 setuptools "cython==0.29.34"

      - name: Build-Cache laden
        uses: actions/cache@v5
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'requirements.txt') }}

      - name: APK bauen
        run: buildozer android debug

      - name: APK für das Release vorbereiten
        shell: bash
        run: |
          APK="$(find bin -maxdepth 1 -type f -name '*.apk' -print -quit)"
          if [[ -z "$APK" ]]; then
            echo "::error::Buildozer hat keine APK erzeugt."
            exit 1
          fi
          cp "$APK" MyAndroidApp.apk

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v6
        with:
          name: MyAndroidApp-${{ github.ref_name }}
          path: MyAndroidApp.apk

      - name: GitHub Release erstellen
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME" MyAndroidApp.apk
          --verify-tag
          --latest
          --generate-notes
          --title "MyAndroidApp $GITHUB_REF_NAME"
